<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do App</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Segoe UI', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 40px 16px;
    }
    .container { width: 100%; max-width: 540px; }
    h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 24px;
      color: #38bdf8;
      letter-spacing: -0.5px;
    }
    form { display: flex; gap: 10px; margin-bottom: 28px; }
    input[type="text"] {
      flex: 1;
      padding: 12px 16px;
      border-radius: 10px;
      border: 1px solid #334155;
      background: #1e293b;
      color: #e2e8f0;
      font-size: 1rem;
      outline: none;
      transition: border 0.2s;
    }
    input[type="text"]:focus { border-color: #38bdf8; }
    button[type="submit"] {
      padding: 12px 20px;
      background: #38bdf8;
      color: #0f172a;
      border: none;
      border-radius: 10px;
      font-weight: 700;
      font-size: 1rem;
      cursor: pointer;
      transition: background 0.2s;
    }
    button[type="submit"]:hover { background: #7dd3fc; }
    .todo-list { display: flex; flex-direction: column; gap: 10px; }
    .todo-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: #1e293b;
      border: 1px solid #334155;
      border-radius: 12px;
      padding: 14px 16px;
      transition: border-color 0.2s;
    }
    .todo-item:hover { border-color: #38bdf8; }
    .todo-item.done .title { text-decoration: line-through; color: #64748b; }
    .left { display: flex; align-items: center; gap: 12px; }
    .checkbox {
      width: 20px; height: 20px;
      border-radius: 6px;
      border: 2px solid #38bdf8;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      background: transparent;
      transition: background 0.2s;
      text-decoration: none;
      flex-shrink: 0;
    }
    .todo-item.done .checkbox { background: #38bdf8; }
    .checkbox::after { content: '✓'; font-size: 12px; color: #0f172a; display: none; }
    .todo-item.done .checkbox::after { display: block; }
    .title { font-size: 0.97rem; }
    .delete {
      color: #475569;
      text-decoration: none;
      font-size: 1.1rem;
      transition: color 0.2s;
    }
    .delete:hover { color: #f87171; }
    .empty { color: #475569; text-align: center; padding: 40px 0; font-size: 0.95rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>📝 To-Do</h1>
    <form action="/add" method="POST">
      <input type="text" name="title" placeholder="Add a new task..." required autofocus />
      <button type="submit">Add</button>
    </form>
    <div class="todo-list">
      {% if todos %}
        {% for todo in todos %}
        <div class="todo-item {% if todo.done %}done{% endif %}">
          <div class="left">
            <a class="checkbox" href="/toggle/{{ todo.id }}"></a>
            <span class="title">{{ todo.title }}</span>
          </div>
          <a class="delete" href="/delete/{{ todo.id }}" title="Delete">✕</a>
        </div>
        {% endfor %}
      {% else %}
        <p class="empty">No tasks yet. Add one above!</p>
      {% endif %}
    </div>
  </div>
</body>
</html>
